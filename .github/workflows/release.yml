name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate and commit CHANGELOG.md to main
        run: |
          # Download git-cliff v2.8.0 (pinned, x86_64 Linux)
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v2.8.0/git-cliff-2.8.0-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp

          # Locate the binary regardless of archive layout
          GIT_CLIFF=$(find /tmp -name 'git-cliff' -type f | head -1)
          chmod +x "$GIT_CLIFF"

          # Generate CHANGELOG.md from full history (all tags included)
          "$GIT_CLIFF" \
            --config cliff.toml \
            --verbose \
            --output CHANGELOG.md

          # Commit and push to main (we are on a detached HEAD at the tag)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || \
            git commit -m "docs(changelog): update for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set project version from tag
        run: mvn versions:set -DnewVersion=${GITHUB_REF_NAME#v} -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn --batch-mode clean verify

      - name: Generate release notes (Markdown)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: bash scripts/generate-release-notes.sh

      - name: Install Pandoc and PDF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended

      - name: Convert release notes to PDF
        run: |
          pandoc release-notes.md \
            --pdf-engine=pdflatex \
            -V geometry:margin=2cm \
            -V colorlinks=true \
            -o release-notes.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            target/*.jar
            release-notes.md
            release-notes.pdf
