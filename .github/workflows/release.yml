name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set project version from tag
        run: mvn versions:set -DnewVersion=${GITHUB_REF_NAME#v} -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn --batch-mode clean verify

      - name: Generate release notes (Markdown)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: bash scripts/generate-release-notes.sh

      - name: Install Pandoc and PDF toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-latex-recommended

      - name: Convert release notes to PDF
        run: |
          pandoc release-notes.md \
            --pdf-engine=pdflatex \
            -V geometry:margin=2cm \
            -V colorlinks=true \
            -o release-notes.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            target/*.jar
            release-notes.md
            release-notes.pdf
