spring.application.name=copilot-agentic-playground
spring.datasource.url=jdbc:postgresql://localhost:5433/playground
spring.datasource.username=playground
spring.datasource.password=playground
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.mvc.problemdetails.enabled=true
features.persistence.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,env,beans,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=@project.version@

# OpenTelemetry (defaults — overridden per profile)
otel.service.name=${spring.application.name}
otel.metrics.exporter=none
