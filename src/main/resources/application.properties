spring.application.name=copilot-agentic-playground
spring.datasource.url=jdbc:postgresql://localhost:5433/playground
spring.datasource.username=playground
spring.datasource.password=playground
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.mvc.problemdetails.enabled=true
features.persistence.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# OpenTelemetry
otel.service.name=${spring.application.name}
otel.exporter.otlp.endpoint=http://localhost:4318
otel.exporter.otlp.protocol=http/protobuf
otel.logs.exporter=otlp
otel.traces.exporter=otlp
otel.metrics.exporter=none
